name: Release

on:
  workflow_dispatch:
    inputs:
      version_override:
        description: "Override version (e.g. 0.2.0). Leave blank to use package.json version."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build Windows artifacts and publish GitHub release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $override = "${{ inputs.version_override }}"
          if ($override -ne "") {
            $version = $override
          } else {
            $version = (Get-Content package.json | ConvertFrom-Json).version
          }
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "tag=v$version" >> $env:GITHUB_OUTPUT

      - name: Typecheck
        run: npm run typecheck

      - name: Lint (strict)
        run: npm run lint:strict

      - name: Build (electron-vite)
        run: npm run build

      - name: Package (electron-builder, Windows)
        run: npx electron-builder --win --config electron-builder.config.mjs --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List build artifacts
        shell: pwsh
        run: |
          Get-ChildItem -Path dist -Recurse |
            Select-Object FullName, Length |
            Format-Table -AutoSize

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: tame-pad ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            dist/*.exe
            dist/*.exe.blockmap
            dist/latest.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
