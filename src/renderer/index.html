<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data:;"
    />
    <title>tame-pad</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="app" class="collapsed">
      <div class="edge" aria-hidden="true"></div>
      <div class="panel" role="region" aria-label="tame-pad">
        <div class="title-bar">
          <span class="title-bar-label">tame-pad</span>
          <div class="title-bar-controls">
            <button
              id="pin"
              type="button"
              class="pin-btn"
              aria-label="ピン留め"
              aria-pressed="false"
              title="ピン留め (展開を固定)"
            >
              📌
            </button>
            <button
              id="close"
              type="button"
              class="close-btn"
              aria-label="閉じる"
              title="閉じる (折りたたみ)"
            >
              ×
            </button>
          </div>
        </div>
        <div class="textarea-wrap">
          <textarea
            id="pad"
            placeholder="ここに書く..."
            spellcheck="false"
            autocomplete="off"
            autocapitalize="off"
            autocorrect="off"
          ></textarea>
        </div>
        <div class="actions">
          <button id="copy" type="button">Copy</button>
          <button id="clear" type="button">Clear</button>
        </div>
        <div class="settings">
          <label
            title="ONにするとCopy時に改行をスペース1つに置き換えます。CLIエージェントへ1行で貼り付けたいときに便利。"
          >
            <input type="checkbox" id="convertNewlines" />
            <span>改行をスペースに変換</span>
          </label>
          <span
            class="settings-hint"
            title="詳しい設定はトレイアイコン → 「設定ファイルを開く」から"
            >?</span
          >
        </div>
        <div id="toast" class="toast" role="status" aria-live="polite">
          コピーしました
        </div>
      </div>
    </div>
    <script type="module" src="./index.ts"></script>
  </body>
</html>
